name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: secondary test
      id: secondary-test
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: secondary test
        setup-command: ''
        command: java TempConverter
        input: '212'
        expected-output: '100.0'
        comparison-method: contains
        timeout: 1
    - name: main test
      id: main-test
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: main test
        setup-command: ''
        command: bash test.sh
        input: ''
        expected-output: ''
        comparison-method: exact
        timeout: 10
        max-score: 80
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        SECONDARY-TEST_RESULTS: "${{steps.secondary-test.outputs.result}}"
        MAIN-TEST_RESULTS: "${{steps.main-test.outputs.result}}"
      with:
        runners: secondary-test,main-test
